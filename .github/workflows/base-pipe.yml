# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: 
      - main
      - dev
  pull_request:
    branches: 
      - main
      - dev

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false

    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Python 3.13.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.13.12"
        

    - name: Install poetry
      run: |
        python -m ensurepip
        python -m pip install --upgrade pip
        python -m pip install poetry
  
    - name: Install dependencies with Poetry
      run:  poetry install --with dev

    - name: Set PYTHONPATH to include the source directory
      run: echo "PYTHONPATH=$PWD/src/ma_pytemp" >> $GITHUB_ENV
        
    - name: Formatter
      run: poetry run ruff format 

    - name: Lint with pylint (fail on warnings/errors)
      run: poetry run pylint src/
        
    - name: Unit Test and report creation
      run: poetry run pytest

    - name: Build executable
      run: poetry run pyinstaller -y main_standard.spec

    # Upload the compiled executable
    - name: Upload artifacts 
      uses: actions/upload-artifact@v7
      with:
        name: ma_pytemp
        path: |
          dist/ 
          config/
          validation_report/
        retention-days: 10

    # Show artifact id and store in enviroment variable
    - name: Output artifact ID
      run:  |
        echo 'artefact_id=${{ steps.artifact-upload-step.outputs.artifact-id }}' >> $GITHUB_ENV
        echo 'Artifact ID is ${{ steps.artifact-upload-step.outputs.artifact-id }}'

  deploy:
    runs-on: windows-latest
    needs: build

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v7
      with:
        name: ma_pytemp
        path: /opt

    - name: List Artifacts
      run: ls /opt


